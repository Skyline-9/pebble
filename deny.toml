[graph]
targets = [
  "aarch64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "all"
ignore = [
  "RUSTSEC-2024-0436", # paste 1.0.15, transitive Candle/tokenizers macro dependency, research defer
  "RUSTSEC-2025-0134", # rustls-pemfile 2.2.0, transitive ureq rustls dependency, research defer
]

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
  { crate = "git2", reason = "use local-only gix after its security spike" },
  { crate = "openssl", reason = "use rustls for network transport" },
  { crate = "serde_yml", reason = "RUSTSEC-2025-0068" },
  { crate = "serde_yaml", reason = "unmaintained" },
]
skip = [
  { name = "ahash", version = "0.7.8", reason = "research-only hnsw transitive duplicate" },
  { name = "base64", version = "0.13.1", reason = "research-only tokenizers transitive duplicate" },
  { name = "cpufeatures", version = "0.2.17", reason = "research-only sha2 transitive duplicate" },
  { name = "darling", version = "0.20.11", reason = "research-only tokenizers transitive duplicate" },
  { name = "darling_core", version = "0.20.11", reason = "research-only tokenizers transitive duplicate" },
  { name = "darling_macro", version = "0.20.11", reason = "research-only tokenizers transitive duplicate" },
  { name = "getrandom", version = "0.2.17", reason = "research-only tokenizer transitive duplicate" },
  { name = "getrandom", version = "0.3.4", reason = "research-only fixture transitive duplicate" },
  { name = "hashbrown", version = "0.11.2", reason = "research-only hnsw transitive duplicate" },
  { name = "hashbrown", version = "0.16.1", reason = "research-only existing search transitive duplicate" },
  { name = "ordered-float", version = "3.9.2", reason = "research-only hnsw transitive duplicate" },
  { name = "rand", version = "0.8.7", reason = "research-only hnsw transitive duplicate" },
  { name = "rand_chacha", version = "0.3.1", reason = "research-only hnsw transitive duplicate" },
  { name = "rand_core", version = "0.6.4", reason = "research-only hnsw transitive duplicate" },
  { name = "safetensors", version = "0.8.0", reason = "Candle transitive duplicate; direct candidate remains 0.7.0" },
  { name = "thiserror", version = "1.0.69", reason = "existing SCIP and optional graph transitive duplicate" },
  { name = "thiserror-impl", version = "1.0.69", reason = "existing SCIP and optional graph transitive duplicate" },
  { name = "tokenizers", version = "0.22.2", reason = "Candle transitive duplicate; direct candidate remains 0.23.1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
