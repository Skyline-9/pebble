name: rust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14-xlarge
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      PEBBLE_TARGET: ${{ matrix.target }}
      PEBBLE_SPIKE_RESULT_DIR: ${{ runner.temp }}/pebble-spike-results
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt
          targets: ${{ matrix.target }}
      - name: Verify native target
        run: |
          test "$(rustc -vV | awk '/^host:/{print $2}')" = "${{ matrix.target }}"
          test "$(rustc --print cfg --target "${{ matrix.target }}" | wc -l)" -gt 0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: bash scripts/install-rust-tools.sh
      - run: bash scripts/validate.sh
      - if: ${{ always() && hashFiles('research/Cargo.toml') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spike-results-${{ matrix.target }}
          path: ${{ runner.temp }}/pebble-spike-results
          if-no-files-found: warn
